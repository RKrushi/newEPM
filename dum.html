<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminary — Design the Future</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --text: #f0eff5;
      --muted: #6b6a7a;
      --accent: #c9b8ff;
      --accent2: #7ef8d6;
      --glow: rgba(201,184,255,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #root { min-height: 100vh; }

    .serif { font-family: 'Instrument Serif', serif; }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { motion, AnimatePresence, useScroll, useTransform, useSpring, useInView } = window.FramerMotion;
    const { useState, useRef, useEffect, useCallback } = React;

    /* ─── CONSTANTS ─────────────────────────────────────────────── */

    const CARDS = [
      {
        id: "card-1",
        tag: "Interface",
        title: "Neural Canvas",
        subtitle: "Generative design at the speed of thought",
        desc: "Craft pixel-perfect interfaces with AI-assisted layout generation. Our proprietary neural engine learns your design language and amplifies it across every component, screen, and interaction — with zero compromise on craft.",
        img: "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=800&q=80",
        color: "#c9b8ff",
        bg: "linear-gradient(135deg,#1a1630 0%,#0f0f1a 100%)",
      },
      {
        id: "card-2",
        tag: "Motion",
        title: "Fluid Time",
        subtitle: "Physics-based animation, reimagined",
        desc: "Every transition is a story. Build spring systems that feel alive, orchestrate complex sequences without timelines, and ship animations that make users stop scrolling — because the motion is simply too beautiful to skip.",
        img: "https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead?w=800&q=80",
        color: "#7ef8d6",
        bg: "linear-gradient(135deg,#0d1f1a 0%,#0a0f0d 100%)",
      },
      {
        id: "card-3",
        tag: "Space",
        title: "Depth Engine",
        subtitle: "3D spatial UI for the next decade",
        desc: "Step beyond flat design. Luminary's depth system creates genuine spatial hierarchy — parallax that reacts to cursor, perspective transforms that breathe, and layered glass surfaces that catch virtual light.",
        img: "https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=800&q=80",
        color: "#ffb8d9",
        bg: "linear-gradient(135deg,#1f0d16 0%,#0f0a0d 100%)",
      },
      {
        id: "card-4",
        tag: "System",
        title: "Token Forge",
        subtitle: "Design tokens that scale to infinity",
        desc: "From micro-brand to enterprise ecosystem. A living token architecture that propagates your visual decisions from atoms to organisms — color, spacing, radius, shadow, motion, all derived from a single source of truth.",
        img: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80",
        color: "#ffd6a0",
        bg: "linear-gradient(135deg,#1f1608 0%,#0f0c05 100%)",
      },
    ];

    const GALLERY = [
      { id: "g1", src: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80", label: "Alpine Ridge" },
      { id: "g2", src: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&q=80", label: "Midnight Peak" },
      { id: "g3", src: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=600&q=80", label: "Mirror Lake" },
      { id: "g4", src: "https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=600&q=80", label: "Dawn Valley" },
      { id: "g5", src: "https://images.unsplash.com/photo-1431440869543-efaf3388c585?w=600&q=80", label: "Coral Depths" },
      { id: "g6", src: "https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=600&q=80", label: "Forest Mist" },
    ];

    const STORY_STEPS = [
      { n: "01", title: "Observe", body: "We spend weeks embedded in your team — watching how design decisions get made, where friction hides, and what tools actually get used versus what people say they use." },
      { n: "02", title: "Distill", body: "From observation comes clarity. We extract the patterns, the principles, the unspoken rules of your visual culture and codify them into a system that can be taught and scaled." },
      { n: "03", title: "Build", body: "Component by component, interaction by interaction, the system comes alive. Every piece is crafted for longevity, consistency, and the aesthetic precision your users deserve." },
      { n: "04", title: "Evolve", body: "Systems are never finished. We stay close — tracking usage, absorbing feedback, and continuously refining. The best design infrastructure grows alongside the product it serves." },
    ];

    /* ─── UTILS ──────────────────────────────────────────────────── */

    const spring = { type: "spring", stiffness: 380, damping: 35 };
    const softSpring = { type: "spring", stiffness: 200, damping: 28 };
    const exitSpring = { type: "spring", stiffness: 300, damping: 32 };

    /* ─── LOADING SCREEN ─────────────────────────────────────────── */

    function Loader({ onDone }) {
      useEffect(() => { setTimeout(onDone, 2200); }, []);
      return (
        <motion.div
          style={ls.root}
          exit={{ opacity: 0 }}
          transition={{ duration: 0.6, ease: [0.76, 0, 0.24, 1] }}
        >
          <motion.div
            initial={{ scaleX: 0 }}
            animate={{ scaleX: 1 }}
            transition={{ duration: 1.8, ease: [0.76, 0, 0.24, 1] }}
            style={ls.bar}
          />
          <motion.p
            initial={{ opacity: 0, y: 12 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ delay: 0.3, duration: 0.6 }}
            style={ls.label}
          >
            Luminary
          </motion.p>
          <motion.span
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            transition={{ delay: 0.5 }}
            style={ls.sub}
          >
            Crafting your experience…
          </motion.span>
        </motion.div>
      );
    }

    const ls = {
      root: { position: "fixed", inset: 0, background: "#0a0a0f", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 10000 },
      bar: { width: 200, height: 1, background: "linear-gradient(90deg,#c9b8ff,#7ef8d6)", transformOrigin: "left", borderRadius: 1, marginBottom: 32 },
      label: { fontFamily: "'Instrument Serif', serif", fontSize: 32, color: "#f0eff5", letterSpacing: "-0.5px" },
      sub: { marginTop: 8, fontSize: 12, color: "#6b6a7a", letterSpacing: "0.1em", textTransform: "uppercase" },
    };

    /* ─── NAVBAR ─────────────────────────────────────────────────── */

    function Navbar() {
      const [open, setOpen] = useState(false);
      const links = ["Work", "Studio", "Approach", "Journal", "Contact"];

      return (
        <>
          <motion.nav
            initial={{ y: -60, opacity: 0 }}
            animate={{ y: 0, opacity: 1 }}
            transition={{ delay: 0.2, ...softSpring }}
            style={nav.root}
          >
            <span style={nav.logo} className="serif">Luminary</span>
            <div style={nav.right}>
              <span style={nav.ctaLink}>Get in Touch</span>
              <motion.button
                layoutId="menu-btn"
                onClick={() => setOpen(true)}
                style={nav.menuBtn}
                whileHover={{ scale: 1.05 }}
                whileTap={{ scale: 0.95 }}
              >
                <span style={nav.menuLabel}>Menu</span>
                <div style={nav.hamburger}>
                  <span style={nav.line} />
                  <span style={{...nav.line, width: 14}} />
                </div>
              </motion.button>
            </div>
          </motion.nav>

          <AnimatePresence>
            {open && (
              <motion.div
                layoutId="menu-btn"
                style={nav.overlay}
                initial={{ borderRadius: 40, scale: 0.6, opacity: 0 }}
                animate={{ borderRadius: 0, scale: 1, opacity: 1 }}
                exit={{ borderRadius: 40, scale: 0.6, opacity: 0 }}
                transition={spring}
              >
                <motion.button
                  onClick={() => setOpen(false)}
                  style={nav.closeBtn}
                  whileHover={{ rotate: 90 }}
                  transition={{ duration: 0.2 }}
                >✕</motion.button>
                <nav style={nav.overlayLinks}>
                  {links.map((l, i) => (
                    <motion.a
                      key={l}
                      href="#"
                      style={nav.overlayLink}
                      initial={{ opacity: 0, x: -40 }}
                      animate={{ opacity: 1, x: 0 }}
                      exit={{ opacity: 0, x: 40 }}
                      transition={{ delay: i * 0.06 + 0.15, ...softSpring }}
                      whileHover={{ x: 12, color: "#c9b8ff" }}
                      onClick={() => setOpen(false)}
                    >
                      <span style={nav.linkNum}>0{i+1}</span>{l}
                    </motion.a>
                  ))}
                </nav>
                <motion.p
                  style={nav.overlayFooter}
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ delay: 0.5 }}
                >
                  hello@luminary.design
                </motion.p>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    }

    const nav = {
      root: { position: "fixed", top: 0, left: 0, right: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 40px", background: "rgba(10,10,15,0.7)", backdropFilter: "blur(20px)", borderBottom: "1px solid rgba(255,255,255,0.05)" },
      logo: { fontSize: 22, color: "#f0eff5", textDecoration: "none" },
      right: { display: "flex", alignItems: "center", gap: 28 },
      ctaLink: { fontSize: 13, color: "#6b6a7a", cursor: "pointer", letterSpacing: "0.02em" },
      menuBtn: { display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: 100, padding: "8px 16px", cursor: "pointer", color: "#f0eff5" },
      menuLabel: { fontSize: 13, letterSpacing: "0.04em" },
      hamburger: { display: "flex", flexDirection: "column", gap: 4 },
      line: { display: "block", height: 1, width: 18, background: "#f0eff5", borderRadius: 1 },
      overlay: { position: "fixed", inset: 0, background: "#0f0f18", zIndex: 999, display: "flex", flexDirection: "column", justifyContent: "center", padding: "80px 60px" },
      closeBtn: { position: "absolute", top: 28, right: 40, background: "none", border: "none", color: "#6b6a7a", fontSize: 22, cursor: "pointer" },
      overlayLinks: { display: "flex", flexDirection: "column", gap: 0 },
      overlayLink: { fontFamily: "'Instrument Serif', serif", fontSize: "clamp(42px, 6vw, 80px)", color: "#f0eff5", textDecoration: "none", display: "flex", alignItems: "baseline", gap: 20, padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.05)", transition: "color 0.2s" },
      linkNum: { fontSize: 13, color: "#4a4a5a", fontFamily: "'DM Sans', sans-serif", letterSpacing: "0.1em" },
      overlayFooter: { position: "absolute", bottom: 40, left: 60, fontSize: 13, color: "#4a4a5a", letterSpacing: "0.08em" },
    };

    /* ─── HERO ───────────────────────────────────────────────────── */

    function Hero() {
      const [expanded, setExpanded] = useState(false);

      return (
        <section style={hero.root}>
          {/* bg glow */}
          <div style={hero.glow1} />
          <div style={hero.glow2} />

          <div style={hero.content}>
            <motion.div
              initial={{ opacity: 0, y: 30 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ delay: 0.4, duration: 0.8, ease: [0.22, 1, 0.36, 1] }}
            >
              <span style={hero.eyebrow}>Design Studio · Est. 2024</span>
            </motion.div>

            <motion.h1
              className="serif"
              style={hero.headline}
              initial={{ opacity: 0, y: 40 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ delay: 0.55, duration: 0.9, ease: [0.22, 1, 0.36, 1] }}
            >
              We craft interfaces<br/>
              <em style={hero.gradText}>worth remembering.</em>
            </motion.h1>

            <motion.p
              style={hero.sub}
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ delay: 0.7, duration: 0.7 }}
            >
              Luminary is a design studio for companies that believe the interface<br/>
              is the product. We build systems that move, breathe, and endure.
            </motion.p>

            <motion.div
              style={hero.btnRow}
              initial={{ opacity: 0, y: 16 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ delay: 0.85 }}
            >
              <motion.button
                style={hero.btnPrimary}
                whileHover={{ scale: 1.04, boxShadow: "0 0 40px rgba(201,184,255,0.3)" }}
                whileTap={{ scale: 0.97 }}
              >
                Start a Project
              </motion.button>
              <motion.button
                style={hero.btnGhost}
                whileHover={{ scale: 1.04 }}
                whileTap={{ scale: 0.97 }}
              >
                View Work ↗
              </motion.button>
            </motion.div>
          </div>

          {/* Morphing hero image */}
          <motion.div
            style={hero.imageWrap}
            initial={{ opacity: 0, x: 60 }}
            animate={{ opacity: 1, x: 0 }}
            transition={{ delay: 0.6, duration: 1, ease: [0.22, 1, 0.36, 1] }}
          >
            <motion.div
              layoutId="hero-img"
              style={hero.imgCard}
              onClick={() => setExpanded(true)}
              whileHover={{ scale: 1.02, boxShadow: "0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(201,184,255,0.12)" }}
              transition={spring}
            >
              <img src="https://images.unsplash.com/photo-1545239351-ef35f43d514b?w=900&q=85" alt="hero" style={hero.img} />
              <div style={hero.imgOverlay}>
                <span style={hero.imgLabel}>Expand ↗</span>
              </div>
            </motion.div>

            {/* floating badges */}
            <motion.div style={{...hero.badge, top: "12%", left: "-10%"}}
              animate={{ y: [0, -8, 0] }} transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }}>
              <span style={hero.badgeDot} />360 Components
            </motion.div>
            <motion.div style={{...hero.badge, bottom: "14%", right: "-8%"}}
              animate={{ y: [0, 8, 0] }} transition={{ duration: 3.5, repeat: Infinity, ease: "easeInOut", delay: 0.5 }}>
              <span style={{...hero.badgeDot, background: "#7ef8d6"}} />98 Satisfaction
            </motion.div>
          </motion.div>

          {/* Fullscreen morph */}
          <AnimatePresence>
            {expanded && (
              <motion.div style={hero.fsOverlay} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setExpanded(false)}>
                <motion.div
                  layoutId="hero-img"
                  style={hero.fsCard}
                  transition={spring}
                >
                  <img src="https://images.unsplash.com/photo-1545239351-ef35f43d514b?w=1400&q=90" alt="hero full" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  <div style={hero.fsClose}>Click anywhere to close</div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </section>
      );
    }

    const hero = {
      root: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "120px 40px 80px", position: "relative", overflow: "hidden", gap: 40, flexWrap: "wrap" },
      glow1: { position: "absolute", width: 600, height: 600, borderRadius: "50%", background: "radial-gradient(circle, rgba(201,184,255,0.08) 0%, transparent 70%)", top: "10%", left: "20%", pointerEvents: "none" },
      glow2: { position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(126,248,214,0.06) 0%, transparent 70%)", bottom: "10%", right: "25%", pointerEvents: "none" },
      content: { flex: "1 1 480px", maxWidth: 600 },
      eyebrow: { fontSize: 12, letterSpacing: "0.15em", textTransform: "uppercase", color: "#6b6a7a" },
      headline: { fontSize: "clamp(44px,5.5vw,76px)", lineHeight: 1.08, color: "#f0eff5", marginTop: 20, marginBottom: 24, fontStyle: "normal" },
      gradText: { background: "linear-gradient(100deg, #c9b8ff 0%, #7ef8d6 60%, #ffb8d9 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", fontStyle: "italic" },
      sub: { fontSize: 16, color: "#8a8a9a", lineHeight: 1.7, marginBottom: 36 },
      btnRow: { display: "flex", gap: 14, flexWrap: "wrap" },
      btnPrimary: { padding: "14px 28px", background: "linear-gradient(135deg, #c9b8ff, #9b8fe8)", border: "none", borderRadius: 100, color: "#0a0a0f", fontWeight: 600, fontSize: 15, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
      btnGhost: { padding: "14px 28px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 100, color: "#f0eff5", fontSize: 15, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
      imageWrap: { flex: "1 1 400px", position: "relative", maxWidth: 560 },
      imgCard: { borderRadius: 24, overflow: "hidden", cursor: "pointer", position: "relative", aspectRatio: "4/3", boxShadow: "0 32px 80px rgba(0,0,0,0.5)" },
      img: { width: "100%", height: "100%", objectFit: "cover", display: "block" },
      imgOverlay: { position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%)", display: "flex", alignItems: "flex-end", padding: 20 },
      imgLabel: { fontSize: 13, color: "rgba(255,255,255,0.7)", letterSpacing: "0.08em" },
      badge: { position: "absolute", background: "rgba(20,20,28,0.9)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 100, padding: "8px 16px", fontSize: 12, color: "#f0eff5", display: "flex", alignItems: "center", gap: 8, whiteSpace: "nowrap" },
      badgeDot: { width: 7, height: 7, borderRadius: "50%", background: "#c9b8ff", display: "inline-block" },
      fsOverlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(8px)", cursor: "pointer" },
      fsCard: { width: "85vw", maxWidth: 1200, aspectRatio: "16/9", borderRadius: 20, overflow: "hidden" },
      fsClose: { position: "absolute", bottom: 20, left: "50%", transform: "translateX(-50%)", color: "rgba(255,255,255,0.5)", fontSize: 13, letterSpacing: "0.08em" },
    };

    /* ─── CARD SECTION ───────────────────────────────────────────── */

    function Cards() {
      const [active, setActive] = useState(null);

      return (
        <section style={cs.root}>
          <div style={cs.header}>
            <motion.span style={cs.eyebrow} {...fadeUp(0)}>Our Offerings</motion.span>
            <motion.h2 className="serif" style={cs.title} {...fadeUp(0.1)}>
              Four disciplines.<br/><em>Infinite possibility.</em>
            </motion.h2>
          </div>

          <div style={cs.grid}>
            {CARDS.map((c, i) => (
              <CardItem key={c.id} card={c} index={i} onOpen={() => setActive(c)} />
            ))}
          </div>

          <AnimatePresence>
            {active && <CardModal card={active} onClose={() => setActive(null)} />}
          </AnimatePresence>
        </section>
      );
    }

    function CardItem({ card, index, onOpen }) {
      const ref = useRef(null);
      const inView = useInView(ref, { once: true, margin: "-80px" });

      return (
        <motion.div
          ref={ref}
          style={cs.card}
          initial={{ opacity: 0, y: 50 }}
          animate={inView ? { opacity: 1, y: 0 } : {}}
          transition={{ delay: index * 0.08, ...softSpring }}
          whileHover={{ y: -6, boxShadow: `0 32px 80px rgba(0,0,0,0.5), 0 0 40px ${card.color}18` }}
          onClick={onOpen}
        >
          <motion.div layoutId={`card-img-${card.id}`} style={cs.cardImgWrap}>
            <img src={card.img} alt={card.title} style={cs.cardImg} />
            <div style={{ ...cs.cardImgOverlay, background: `linear-gradient(to top, ${card.bg.split(",")[0].replace("linear-gradient(135deg,", "").trim()} 0%, transparent 60%)` }} />
          </motion.div>
          <div style={cs.cardBody}>
            <motion.span layoutId={`card-tag-${card.id}`} style={{ ...cs.cardTag, color: card.color, borderColor: `${card.color}30` }}>{card.tag}</motion.span>
            <motion.h3 layoutId={`card-title-${card.id}`} className="serif" style={cs.cardTitle}>{card.title}</motion.h3>
            <p style={cs.cardSub}>{card.subtitle}</p>
            <div style={cs.cardFooter}>
              <span style={{ ...cs.readMore, color: card.color }}>Explore →</span>
            </div>
          </div>
        </motion.div>
      );
    }

    function CardModal({ card, onClose }) {
      return (
        <motion.div
          style={cs.modalOverlay}
          initial={{ opacity: 0 }}
          animate={{ opacity: 1 }}
          exit={{ opacity: 0 }}
          onClick={onClose}
        >
          <motion.div
            style={{ ...cs.modal, background: card.bg }}
            layoutId={`card-bg-${card.id}`}
            onClick={e => e.stopPropagation()}
            transition={spring}
          >
            <motion.div layoutId={`card-img-${card.id}`} style={cs.modalImgWrap} transition={spring}>
              <img src={card.img.replace("w=800", "w=1200")} alt={card.title} style={cs.modalImg} />
              <div style={cs.modalImgGrad} />
            </motion.div>
            <div style={cs.modalContent}>
              <motion.span layoutId={`card-tag-${card.id}`} style={{ ...cs.cardTag, color: card.color, borderColor: `${card.color}30`, fontSize: 13 }} transition={spring}>{card.tag}</motion.span>
              <motion.h2 layoutId={`card-title-${card.id}`} className="serif" style={cs.modalTitle} transition={spring}>{card.title}</motion.h2>
              <motion.p
                style={cs.modalDesc}
                initial={{ opacity: 0, y: 16 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ delay: 0.25 }}
              >{card.desc}</motion.p>
              <motion.div
                style={cs.modalActions}
                initial={{ opacity: 0, y: 12 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ delay: 0.35 }}
              >
                <motion.button style={{ ...cs.modalBtn, background: card.color, color: "#0a0a0f" }} whileHover={{ scale: 1.04 }} whileTap={{ scale: 0.97 }}>
                  Get Started
                </motion.button>
                <motion.button style={cs.modalBtnGhost} whileHover={{ scale: 1.04 }} onClick={onClose}>
                  ✕ Close
                </motion.button>
              </motion.div>
            </div>
          </motion.div>
        </motion.div>
      );
    }

    const cs = {
      root: { padding: "120px 40px", maxWidth: 1300, margin: "0 auto" },
      header: { marginBottom: 64 },
      eyebrow: { display: "block", fontSize: 12, letterSpacing: "0.15em", textTransform: "uppercase", color: "#6b6a7a", marginBottom: 16 },
      title: { fontSize: "clamp(36px,4vw,58px)", color: "#f0eff5", lineHeight: 1.12 },
      grid: { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))", gap: 20 },
      card: { background: "#111118", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, overflow: "hidden", cursor: "pointer", transition: "box-shadow 0.3s" },
      cardImgWrap: { position: "relative", aspectRatio: "16/10", overflow: "hidden" },
      cardImg: { width: "100%", height: "100%", objectFit: "cover", display: "block", transition: "transform 0.5s", transformOrigin: "center" },
      cardImgOverlay: { position: "absolute", inset: 0 },
      cardBody: { padding: "20px 24px 24px" },
      cardTag: { fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", border: "1px solid", borderRadius: 100, padding: "3px 10px", display: "inline-block", marginBottom: 10 },
      cardTitle: { fontSize: 24, color: "#f0eff5", marginBottom: 6 },
      cardSub: { fontSize: 13, color: "#6b6a7a", lineHeight: 1.5 },
      cardFooter: { marginTop: 16 },
      readMore: { fontSize: 13, letterSpacing: "0.04em", fontWeight: 500 },
      modalOverlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 3000, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, backdropFilter: "blur(12px)" },
      modal: { width: "100%", maxWidth: 760, borderRadius: 24, overflow: "hidden", position: "relative", boxShadow: "0 60px 120px rgba(0,0,0,0.6)" },
      modalImgWrap: { position: "relative", aspectRatio: "16/8", overflow: "hidden" },
      modalImg: { width: "100%", height: "100%", objectFit: "cover", display: "block" },
      modalImgGrad: { position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(10,10,15,0.9) 0%, transparent 60%)" },
      modalContent: { padding: "28px 36px 36px" },
      modalTitle: { fontSize: "clamp(28px,4vw,42px)", color: "#f0eff5", margin: "10px 0 16px" },
      modalDesc: { fontSize: 15, color: "#9a9ab0", lineHeight: 1.75, marginBottom: 28 },
      modalActions: { display: "flex", gap: 12 },
      modalBtn: { padding: "12px 24px", border: "none", borderRadius: 100, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
      modalBtnGhost: { padding: "12px 24px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 100, color: "#f0eff5", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
    };

    /* ─── GALLERY ────────────────────────────────────────────────── */

    function Gallery() {
      const [selected, setSelected] = useState(null);

      return (
        <section style={gal.root}>
          <div style={gal.header}>
            <motion.span style={cs.eyebrow} {...fadeUp(0)}>Visual Archive</motion.span>
            <motion.h2 className="serif" style={cs.title} {...fadeUp(0.1)}>
              Moments in<br/><em>light & form.</em>
            </motion.h2>
          </div>

          <div style={gal.grid}>
            {GALLERY.map((item, i) => (
              <GalleryItem key={item.id} item={item} index={i} onSelect={() => setSelected(item)} />
            ))}
          </div>

          <AnimatePresence>
            {selected && (
              <motion.div
                style={gal.overlay}
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                onClick={() => setSelected(null)}
              >
                <motion.div
                  layoutId={`gallery-${selected.id}`}
                  style={gal.preview}
                  transition={spring}
                >
                  <img src={selected.src.replace("w=600", "w=1400")} alt={selected.label} style={gal.previewImg} />
                  <motion.div
                    style={gal.previewLabel}
                    initial={{ opacity: 0, y: 12 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 0.25 }}
                  >
                    {selected.label}
                  </motion.div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </section>
      );
    }

    function GalleryItem({ item, index, onSelect }) {
      const ref = useRef(null);
      const inView = useInView(ref, { once: true, margin: "-60px" });
      const cols = [1, 1, 1, 1, 1, 1];
      const spans = ["span 1", "span 1", "span 1", "span 1", "span 1", "span 1"];

      return (
        <motion.div
          ref={ref}
          layoutId={`gallery-${item.id}`}
          style={{ ...gal.item, gridColumn: index === 0 ? "span 2" : index === 3 ? "span 2" : "span 1" }}
          initial={{ opacity: 0, scale: 0.94 }}
          animate={inView ? { opacity: 1, scale: 1 } : {}}
          transition={{ delay: index * 0.06, ...softSpring }}
          whileHover={{ scale: 1.02 }}
          onClick={onSelect}
        >
          <img src={item.src} alt={item.label} style={gal.itemImg} />
          <div style={gal.itemOverlay}>
            <span style={gal.itemLabel}>{item.label}</span>
          </div>
        </motion.div>
      );
    }

    const gal = {
      root: { padding: "120px 40px", maxWidth: 1300, margin: "0 auto" },
      header: { marginBottom: 56 },
      grid: { display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12 },
      item: { borderRadius: 16, overflow: "hidden", cursor: "pointer", position: "relative", aspectRatio: "4/3" },
      itemImg: { width: "100%", height: "100%", objectFit: "cover", display: "block" },
      itemOverlay: { position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%)", opacity: 0, transition: "opacity 0.3s", display: "flex", alignItems: "flex-end", padding: 16 },
      itemLabel: { color: "#fff", fontSize: 14, letterSpacing: "0.06em" },
      overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", zIndex: 3000, display: "flex", alignItems: "center", justifyContent: "center", padding: 32, backdropFilter: "blur(16px)", cursor: "pointer" },
      preview: { width: "85vw", maxWidth: 1100, borderRadius: 20, overflow: "hidden", position: "relative" },
      previewImg: { width: "100%", display: "block", objectFit: "cover" },
      previewLabel: { position: "absolute", bottom: 20, left: 24, color: "#fff", fontSize: 15, letterSpacing: "0.08em", background: "rgba(0,0,0,0.5)", backdropFilter: "blur(8px)", padding: "6px 14px", borderRadius: 100 },
    };

    /* ─── STORY SECTION ──────────────────────────────────────────── */

    function Story() {
      const [active, setActive] = useState(0);
      const containerRef = useRef(null);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          (entries) => { if (entries[0].isIntersecting) setActive(prev => prev); },
          { threshold: 0.3 }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, []);

      return (
        <section ref={containerRef} style={st.root}>
          <div style={st.inner}>
            <div style={st.left}>
              <motion.span style={cs.eyebrow} {...fadeUp(0)}>Our Process</motion.span>
              <motion.h2 className="serif" style={{ ...cs.title, marginBottom: 48 }} {...fadeUp(0.1)}>
                How we work<br/><em>with you.</em>
              </motion.h2>
              <div style={st.steps}>
                {STORY_STEPS.map((s, i) => (
                  <motion.div
                    key={s.n}
                    style={{ ...st.step, borderLeft: `2px solid ${active === i ? "#c9b8ff" : "rgba(255,255,255,0.07)"}` }}
                    onClick={() => setActive(i)}
                    whileHover={{ x: 4 }}
                    animate={{ opacity: active === i ? 1 : 0.4 }}
                    transition={{ duration: 0.3 }}
                  >
                    <span style={st.stepNum}>{s.n}</span>
                    <div>
                      <p style={st.stepTitle}>{s.title}</p>
                    </div>
                  </motion.div>
                ))}
              </div>
            </div>

            <div style={st.right}>
              <AnimatePresence mode="wait">
                <motion.div
                  key={active}
                  style={st.panel}
                  initial={{ opacity: 0, x: 40, filter: "blur(8px)" }}
                  animate={{ opacity: 1, x: 0, filter: "blur(0px)" }}
                  exit={{ opacity: 0, x: -40, filter: "blur(8px)" }}
                  transition={{ duration: 0.4, ease: [0.22, 1, 0.36, 1] }}
                >
                  <span style={st.panelNum}>{STORY_STEPS[active].n}</span>
                  <h3 className="serif" style={st.panelTitle}>{STORY_STEPS[active].title}</h3>
                  <p style={st.panelBody}>{STORY_STEPS[active].body}</p>
                  <div style={st.progress}>
                    {STORY_STEPS.map((_, i) => (
                      <motion.div
                        key={i}
                        style={st.dot}
                        animate={{ background: i === active ? "#c9b8ff" : "rgba(255,255,255,0.15)", scale: i === active ? 1.4 : 1 }}
                        onClick={() => setActive(i)}
                        whileHover={{ scale: 1.6 }}
                      />
                    ))}
                  </div>
                </motion.div>
              </AnimatePresence>
            </div>
          </div>
        </section>
      );
    }

    const st = {
      root: { padding: "120px 40px", background: "#0d0d14" },
      inner: { maxWidth: 1200, margin: "0 auto", display: "flex", gap: 80, alignItems: "flex-start", flexWrap: "wrap" },
      left: { flex: "1 1 320px" },
      right: { flex: "1 1 440px" },
      steps: { display: "flex", flexDirection: "column", gap: 0 },
      step: { padding: "16px 20px", cursor: "pointer", transition: "border-color 0.3s" },
      stepNum: { fontSize: 11, color: "#4a4a5a", letterSpacing: "0.1em", display: "block", marginBottom: 3 },
      stepTitle: { fontSize: 17, color: "#f0eff5", fontWeight: 500 },
      panel: { background: "#111118", borderRadius: 24, padding: "48px", border: "1px solid rgba(255,255,255,0.07)", position: "relative", overflow: "hidden" },
      panelNum: { fontSize: 80, fontFamily: "'Instrument Serif',serif", color: "rgba(255,255,255,0.03)", position: "absolute", top: 16, right: 24, lineHeight: 1 },
      panelTitle: { fontSize: 42, color: "#f0eff5", marginBottom: 20, position: "relative", zIndex: 1 },
      panelBody: { fontSize: 16, color: "#8a8a9a", lineHeight: 1.8, position: "relative", zIndex: 1, marginBottom: 32 },
      progress: { display: "flex", gap: 8 },
      dot: { width: 7, height: 7, borderRadius: "50%", cursor: "pointer" },
    };

    /* ─── MARQUEE ────────────────────────────────────────────────── */

    function Marquee() {
      const items = ["Neural Canvas", "Fluid Time", "Depth Engine", "Token Forge", "Motion Systems", "Interface Design", "Brand Identity", "Type Craft"];
      return (
        <div style={mq.root}>
          <motion.div
            style={mq.track}
            animate={{ x: ["0%", "-50%"] }}
            transition={{ duration: 22, repeat: Infinity, ease: "linear" }}
          >
            {[...items, ...items].map((t, i) => (
              <span key={i} style={mq.item}>
                {t}<span style={mq.sep}>·</span>
              </span>
            ))}
          </motion.div>
        </div>
      );
    }

    const mq = {
      root: { overflow: "hidden", padding: "28px 0", borderTop: "1px solid rgba(255,255,255,0.06)", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "#0d0d14" },
      track: { display: "flex", whiteSpace: "nowrap", willChange: "transform" },
      item: { fontSize: 15, color: "#6b6a7a", letterSpacing: "0.04em", padding: "0 16px", fontFamily: "'Instrument Serif',serif", fontStyle: "italic" },
      sep: { margin: "0 10px", color: "#3a3a4a" },
    };

    /* ─── FOOTER ─────────────────────────────────────────────────── */

    function Footer() {
      return (
        <footer style={ft.root}>
          <div style={ft.top}>
            <div>
              <p style={ft.logo} className="serif">Luminary</p>
              <p style={ft.tagline}>Design that endures.</p>
            </div>
            <div style={ft.links}>
              {["Work", "Studio", "Journal", "Contact"].map(l => (
                <a key={l} href="#" style={ft.link}>{l}</a>
              ))}
            </div>
          </div>
          <div style={ft.bottom}>
            <p style={ft.copy}>© 2024 Luminary Design Studio</p>
            <p style={ft.copy}>Made with craft & care</p>
          </div>
        </footer>
      );
    }

    const ft = {
      root: { padding: "80px 40px 40px", background: "#0a0a0f", borderTop: "1px solid rgba(255,255,255,0.05)" },
      top: { maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 60, flexWrap: "wrap", gap: 32 },
      logo: { fontSize: 28, color: "#f0eff5", marginBottom: 8 },
      tagline: { fontSize: 14, color: "#4a4a5a" },
      links: { display: "flex", gap: 32 },
      link: { fontSize: 14, color: "#6b6a7a", textDecoration: "none", transition: "color 0.2s" },
      bottom: { maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.04)", flexWrap: "wrap", gap: 12 },
      copy: { fontSize: 12, color: "#3a3a4a", letterSpacing: "0.06em" },
    };

    /* ─── HELPERS ────────────────────────────────────────────────── */

    function fadeUp(delay = 0) {
      return {
        initial: { opacity: 0, y: 24 },
        whileInView: { opacity: 1, y: 0 },
        viewport: { once: true, margin: "-60px" },
        transition: { delay, duration: 0.7, ease: [0.22, 1, 0.36, 1] },
      };
    }

    /* ─── APP ────────────────────────────────────────────────────── */

    function App() {
      const [loaded, setLoaded] = useState(false);

      return (
        <AnimatePresence mode="wait">
          {!loaded ? (
            <Loader key="loader" onDone={() => setLoaded(true)} />
          ) : (
            <motion.div
              key="app"
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              transition={{ duration: 0.5 }}
            >
              <Navbar />
              <Hero />
              <Marquee />
              <Cards />
              <Gallery />
              <Story />
              <Footer />

              {/* Cursor glow */}
              <CursorGlow />
            </motion.div>
          )}
        </AnimatePresence>
      );
    }

    function CursorGlow() {
      const [pos, setPos] = useState({ x: -200, y: -200 });
      useEffect(() => {
        const handler = e => setPos({ x: e.clientX, y: e.clientY });
        window.addEventListener("mousemove", handler);
        return () => window.removeEventListener("mousemove", handler);
      }, []);
      return (
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 9998, overflow: "hidden" }}>
          <motion.div
            animate={{ x: pos.x - 200, y: pos.y - 200 }}
            transition={{ type: "spring", stiffness: 500, damping: 60 }}
            style={{ width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(201,184,255,0.04) 0%, transparent 70%)", position: "absolute" }}
          />
        </div>
      );
    }

    // Add hover effect to gallery items via JS
    document.addEventListener("mouseover", e => {
      const item = e.target.closest && e.target.closest("[data-gallery-item]");
      if (item) item.querySelector("[data-overlay]").style.opacity = "1";
    });

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <style>
    /* responsive tweaks */
    @media(max-width:768px){
      nav { padding: 14px 20px !important; }
      section { padding-left: 20px !important; padding-right: 20px !important; }
    }
    /* gallery hover via CSS since inline style doesn't support :hover */
    [data-gallery] > div:hover > div:last-child { opacity: 1 !important; }
  </style>
</body>
</html>
